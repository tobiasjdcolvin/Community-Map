server {
    listen 80;
    server_name communitymap.health www.communitymap.health;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name communitymap.health www.communitymap.health;

    ssl_certificate /etc/letsencrypt/live/communitymap.health/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/communitymap.health/privkey.pem;

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}