<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Map Health</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Your files -->
    <link rel="stylesheet" href="/static/index.css">
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <script src="/static/index.js" defer></script>
</head>
<body>
    <header>
        <h1>Community Map Health</h1>
    </header>
    <main>
        <p>Main content</p>
        <section>
            <div>
                <h2>Map</h2>
                <div class="box" id="map">
                    <p>Map info</p>
                </div>
            </div>
            <div>
                <form id = "symptoms-form">
                    <label>
                        <input type="checkbox" id="cough_congestion"> cough_congestion
                    </label>

                    <label>
                        <input type="checkbox" id="nausea_vomiting"> nausea_vomiting
                    </label>

                    <label>
                        <input type="checkbox" id="difficulty_breathing"> difficulty_breathing
                    </label>

                    <label>
                        <input type="checkbox" id="sore_throat"> sore_throat
                    </label>

                    <label>
                        <input type="checkbox" id="rash"> rash 
                    </label>

                    <label>
                        <input type="checkbox" id="fever"> fever
                    </label>

                    <label>
                        <input type="checkbox" id="chills"> chills
                    </label>

                    <label>
                        <input type="checkbox" id="diarrhea"> diarrhea 
                    </label>

                    <label>
                        <input type="checkbox" id="attending_a_recent_mass_gathering"> attending_a_recent_mass_gathering 
                    </label>

                    <label>
                        <input type="checkbox" id="history_of_travel"> history_of_travel
                    </label>

                    <label>
                        <input type="submit" id="submit-btn"> Submit Survey
                    </label>

                </form>
                <select title="feature">
                    <option>Diseases</option>
                    <option>Symptoms</option>
                </select>
            </div>
        </section>
    </main>
    <footer>
        <p>Authentic Idiocracy &copy; 2026 Hack Arizona</p>
        <p>Joseph Hill, Tobias Colvin, Sean McCormick, Lucia Alday</p>
    </footer>
</body>
</html>
