<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Map Health</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Your files -->
    <link rel="stylesheet" href="/static/index.css">
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <script src="/static/index.js" defer></script>
</head>
<body>
    <header>
        <h1>Community Map Health</h1>
    </header>
    <main>
        <input
            type="text"
            placeholder="Enter a city"
        />
        <section>
            <div class="box" id="map"></div>
            <article>
                <select title="feature">
                    <option>Diseases</option>
                    <option>Symptoms</option>
                </select>
                <legend>
                    <div class="pair">
                        <div class="color" style="background-color: #202038;"></div>
                        <h3>Attribute 1</h3>
                    </div>
                    <div class="pair">
                        <div class="color" style="background-color: #284591;"></div>
                        <h3>Attribute 2</h3>
                    </div>
                </legend>
            </article>
        </section>
        <form onSubmit="">
            <h3>How are you feeling?</h3>
            <input
                type="text"

            />
        </form>
    </main>
    <footer>
        <p>Authentic Idiocracy &copy; 2026 Hack Arizona</p>
        <p>Joseph Hill, Tobias Colvin, Sean McCormick, Lucia Alday</p>
    </footer>
</body>
</html>
