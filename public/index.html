<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Map Health</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Your files -->
    <link rel="stylesheet" href="/static/index.css">
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <script src="/static/index.js" defer></script>
</head>
<body>
    <header>
        <h1>Community Map Health</h1>
    </header>
    <main>
        <input
            type="text"
            placeholder="Enter a city"
        />
        <section>
            <div class="box" id="map"></div>
            <article>
                <select title="feature">
                    <option>Diseases</option>
                    <option>Symptoms</option>
                </select>
                <legend>
                    <div class="pair">
                        <div class="color" style="background-color: #202038;border-color: #3e6954"></div>
                        <h3>Attribute 1</h3>
                    </div>
                    <div class="pair">
                        <div class="color" style="background-color: #284591;border-color: #465c93"></div>
                        <h3>Attribute 2</h3>
                    </div>
                </legend>
            </article>
        </section>
        <form id = "symptoms-form">
            <h3>Have you experienced any of the following in the last 24 hours?</h3>
            <div class="container">
                <div class="column">
                    <h4>Oral/Respiratory</h4>
                    <label>
                        <input type="checkbox" id="cough_congestion">
                        Cough or congestion
                    </label>
                    <label>
                        <input type="checkbox" id="difficulty_breathing">
                        Difficulty breathing
                    </label>
                    <label>
                        <input type="checkbox" id="sore_throat">
                        Sore throat
                    </label>
                </div>
                <div class="column">
                    <h4>Digestive</h4>
                    <label>
                        <input type="checkbox" id="nausea_vomiting">
                        Nausea or vomiting
                    </label>
                    <label>
                        <input type="checkbox" id="diarrhea"> diarrhea 
                    </label>
                </div>
                <div class="column">
                    <h4>General Illness</h4>
                    <label>
                        <input type="checkbox" id="fever"> fever
                    </label>
                    <label>
                        <input type="checkbox" id="chills"> chills
                    </label>
                    <label>
                        <input type="checkbox" id="rash"> rash 
                    </label>
                </div>
                <div class="column">
                    <h4>Recent Activity (within the past month)</h4>
                    <label>
                        <input type="checkbox" id="attending_a_recent_mass_gathering"> Attended a mass gethering (20+) 
                    </label>
                    <label>
                        <input type="checkbox" id="history_of_travel"> Travel to another state/province
                    </label>
                    <input type="text" id="travel_city" placeholder="If so, what city?"/>
                </div>
            </div>
            <label>
                <button type="submit" id="submit-btn"> Submit Survey </button>
            </label>
        </form>
    </main>
    <footer>
        <p>Authentic Idiocracy &copy; 2026 Hack Arizona</p>
        <p>Joseph Hill, Tobias Colvin, Sean McCormick, Lucia Alday</p>
    </footer>
</body>
</html>
